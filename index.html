<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Fundamentals</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- HERO -->
    <section class="hero">
        <h1>Flow Fundamentals</h1>
        <p>From overthinking to alignment</p>
        <button onclick="scrollToSection()">Get Started</button>
    </section>

    <!-- PROBLEM -->
    <section class="section light">
        <h2>Why nothing seems to work</h2>
        <p>You try to fix your life by thinking more, doing more, and trying more techniques.</p>
    </section>

    <!-- MODEL -->
    <section class="section dark">
        <h2>Mind • Heart • Body</h2>
        <div class="circles">
            <div class="circle">Mind</div>
            <div class="circle">Heart</div>
            <div class="circle">Body</div>
        </div>
    </section>

    <!-- STEPS -->
    <section class="section light" id="steps">
        <h2>How it works</h2>
        <div class="steps">
            <div class="card">1. Understand</div>
            <div class="card">2. Align</div>
            <div class="card">3. Act</div>
        </div>
    </section>

    <!-- CTA -->
    <section class="cta">
        <h2>Start living in alignment</h2>
        <button onclick="changeText()">Click Me</button>
        <p id="cta-text"></p>
    </section>

    <script src="script.js"></script>
</body>
</html>
