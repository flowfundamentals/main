</section>

        <p>
            You try to fix your life from the same place that created the problem.

</section>

            <div class="circle">Body</div>
        </div>
    </div>
</section>

<section class="section light" id="steps">
    <div class="container">
        <h2>The shift</h2>

        <div class="steps">
            <div class="card">Understand</div>
            <div class="card">Align</div>

    </div>
</section>

<section class="cta">

    <button onclick="changeText()">Enter</button>
